<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Álbum responsivo com fotografias de templos de A Igreja de Jesus Cristo dos Santos dos Últimos Dias."
  >
  <meta name="author" content="Lucas da Luz Morais">

  <title>Álbum do Templo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="estilos/templos.css">
  <link rel="stylesheet" href="estilos/templos-grandes.css">

  <script src="scripts/templos.js" defer></script>
</head>

<body>
  <header>
    <div class="header-content">
      <span class="site-title">Álbum do Templo</span>

      <button
        id="menu-button"
        class="menu-button"
        type="button"
        aria-label="Abrir menu de navegação"
        aria-controls="navigation"
        aria-expanded="false"
      >
        ☰
      </button>

      <nav id="navigation" aria-label="Navegação principal">
        <a href="#" aria-current="page">Página Inicial</a>
        <a href="#">Antigo</a>
        <a href="#">Novo</a>
        <a href="#">Grande</a>
        <a href="#">Pequeno</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Templos</h1>

    <section class="temple-grid" aria-label="Galeria de templos">
      <figure>
        <img
          src="imagens/templo-sao-paulo.webp"
          alt="Templo de São Paulo Brasil"
          width="400"
          height="267"
          loading="lazy"
        >
        <figcaption>Templo de São Paulo Brasil</figcaption>
      </figure>

      <figure>
        <img
          src="imagens/templo-campinas.webp"
          alt="Templo de Campinas Brasil"
          width="400"
          height="267"

        <figcaption>Templo de Campinas Brasil</figcaption>
      </figure>

      <figure>
        <img
          src="imagens/templo-rio-de-janeiro.webp"

      <figure>

          src="imagens/templo-fortaleza.webp"

          width="400"
          height="267"

        >
        <figcaption>Templo de Fortaleza Brasil</figcaption>
      </figure>

      <figure>
        <img
          src="imagens/templo-manaus.webp"
          alt="Templo de Manaus Brasil"
          width="400"
          height="267"

      <figure>

  </main>

  <footer>
    <p>
      &copy; <span id="current-year"></span>
      | Lucas da Luz Morais | Brasil
    </p>
    <p id="last-modified"></p>
  </footer>

</html>
